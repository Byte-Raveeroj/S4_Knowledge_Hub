name: Notion Change Notify

on:
  schedule:
    - cron: '*/30 1-12 * * 1-5'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Notion databases and notify Teams
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_IDS: ${{ secrets.NOTION_DATABASE_IDS }}
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_NOTION_WEBHOOK }}
        run: |
          cat > /tmp/check_notion.py << 'PYEOF'
          import os, json, urllib.request
          from datetime import datetime, timezone, timedelta

          token   = os.environ['NOTION_TOKEN']
          db_ids  = [d.strip() for d in os.environ['DB_IDS'].replace('\n', ',').split(',') if d.strip()]
          webhook = os.environ['TEAMS_WEBHOOK']
          now     = datetime.now(timezone.utc)
          since   = (now - timedelta(minutes=31)).strftime('%Y-%m-%dT%H:%M:%S.000Z')
          ts_str  = (now + timedelta(hours=7)).strftime('%H:%M')

          def notion_req(path, data=None, method='GET'):
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(
                  f'https://api.notion.com/v1{path}',
                  data=body,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Notion-Version': '2022-06-28',
                      'Content-Type': 'application/json'
                  },
                  method=method
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def time_ago(iso_str):
              dt = datetime.fromisoformat(iso_str.replace('Z', '+00:00'))
              diff = int((now - dt).total_seconds())
              if diff < 60:    return 'just now'
              if diff < 3600:  return f'{diff // 60} min ago'
              if diff < 86400: return f'{diff // 3600} hr ago'
              return f'{diff // 86400} days ago'

          user_cache = {}
          def get_user_name(user_id):
              if not user_id: return ''
              if user_id in user_cache: return user_cache[user_id]
              try:
                  u = notion_req(f'/users/{user_id}')
                  name = u.get('name', '')
                  parts = name.strip().split()
                  short = f"{parts[0]} {parts[-1][0]}." if len(parts) > 1 else name
                  user_cache[user_id] = short
                  return short
              except:
                  user_cache[user_id] = ''
                  return ''

          # --- Fetch DB names ---
          db_names = {}
          for db_id in db_ids:
              try:
                  db = notion_req(f'/databases/{db_id}')
                  parts = db.get('title', [])
                  db_names[db_id] = ''.join(t.get('plain_text', '') for t in parts) or 'Untitled DB'
              except Exception as e:
                  db_names[db_id] = 'Notion DB'
                  print(f'DB name skip {db_id}: {e}')

          # --- Query each DB for recent changes ---
          updated = []
          for db_id in db_ids:
              try:
                  data = notion_req(f'/databases/{db_id}/query', {
                      'filter': {
                          'timestamp': 'last_edited_time',
                          'last_edited_time': {'after': since}
                      }
                  }, 'POST')
                  for page in data.get('results', []):
                      title = ''
                      for val in page.get('properties', {}).values():
                          if val.get('type') == 'title':
                              title = ''.join(t.get('plain_text', '') for t in val.get('title', []))
                              break
                      editor_id   = page.get('last_edited_by', {}).get('id', '')
                      editor_name = get_user_name(editor_id)
                      page_url     = page.get('url', 'https://notion.so')
                      edited_time  = page.get('last_edited_time', '')
                      created_time = page.get('created_time', '')
                      is_new       = created_time >= since
                      updated.append({
                          'title':  title or 'Untitled',
                          'url':    page_url,
                          'db':     db_names.get(db_id, 'Notion DB'),
                          'editor': editor_name,
                          'ago':    time_ago(edited_time) if edited_time else '',
                          'is_new': is_new,
                      })
              except Exception as e:
                  print(f'Skip {db_id}: {e}')

          if not updated:
              print('No changes found.')
              exit(0)

          pages = updated[:5]
          extra = max(0, len(updated) - 5)

          # --- Build page rows ---
          page_rows = []
          for p in pages:
              badge_emoji = '🟢' if p['is_new'] else '✏️'
              badge_label = 'New' if p['is_new'] else 'Edited'

              # meta: single line  "📁 DB  ·  Editor  ·  time ago  · 🟢 New"
              meta_parts = [x for x in [p['db'], p['editor'], p['ago']] if x]
              meta_line  = '  ·  '.join(meta_parts) + f'  {badge_emoji} {badge_label}'

              page_rows.append({
                  'type': 'Container',
                  'style': 'emphasis',
                  'bleed': True,
                  'spacing': 'Small',
                  'items': [
                      # Title + Open button
                      {
                          'type': 'ColumnSet',
                          'columns': [
                              {
                                  'type': 'Column',
                                  'width': 'stretch',
                                  'verticalContentAlignment': 'Center',
                                  'items': [{
                                      'type': 'TextBlock',
                                      'text': f"📄 **[{p['title']}]({p['url']})**",
                                      'size': 'Default',
                                      'wrap': True
                                  }]
                              },
                              {
                                  'type': 'Column',
                                  'width': 'auto',
                                  'verticalContentAlignment': 'Center',
                                  'items': [{
                                      'type': 'ActionSet',
                                      'actions': [{
                                          'type': 'Action.OpenUrl',
                                          'title': 'Open ↗',
                                          'url': p['url'],
                                          'style': 'positive'
                                      }]
                                  }]
                              }
                          ]
                      },
                      # Meta — single TextBlock, no extra columns = no stray bullets
                      {
                          'type': 'TextBlock',
                          'text': meta_line,
                          'size': 'Small',
                          'isSubtle': True,
                          'wrap': True,
                          'spacing': 'None'
                      }
                  ]
              })

          extra_note = f'  *(+{extra} more)*' if extra > 0 else ''
          subtitle   = f"พบ {len(updated)} หน้าที่แก้ไขใน 30 นาทีล่าสุด{extra_note}"

          card = {
              'type': 'message',
              'attachments': [{
                  'contentType': 'application/vnd.microsoft.card.adaptive',
                  'content': {
                      '$schema': 'http://adaptivecards.io/schemas/adaptive-card.json',
                      'type': 'AdaptiveCard',
                      'version': '1.4',
                      'body': [
                          # --- Header ---
                          {
                              'type': 'ColumnSet',
                              'columns': [
                                  {
                                      'type': 'Column',
                                      'width': 'stretch',
                                      'items': [
                                          {
                                              'type': 'TextBlock',
                                              'text': '📓  Notion อัพเดท',
                                              'weight': 'Bolder',
                                              'size': 'Large',
                                              'color': 'Warning'
                                          },
                                          {
                                              'type': 'TextBlock',
                                              'text': subtitle,
                                              'size': 'Small',
                                              'isSubtle': True,
                                              'wrap': True,
                                              'spacing': 'None'
                                          }
                                      ]
                                  },
                                  {
                                      'type': 'Column',
                                      'width': 'auto',
                                      'horizontalAlignment': 'Right',
                                      'verticalContentAlignment': 'Center',
                                      'items': [
                                          {
                                              'type': 'TextBlock',
                                              'text': 'NOTION',
                                              'weight': 'Bolder',
                                              'size': 'Small',
                                              'color': 'Warning',
                                              'horizontalAlignment': 'Right'
                                          },
                                          {
                                              'type': 'TextBlock',
                                              'text': ts_str,
                                              'size': 'Small',
                                              'isSubtle': True,
                                              'horizontalAlignment': 'Right',
                                              'spacing': 'None'
                                          }
                                      ]
                                  }
                              ]
                          }
                      ] + page_rows,
                      'actions': [{
                          'type': 'Action.OpenUrl',
                          'title': 'Open Notion',
                          'url': 'https://notion.so'
                      }]
                  }
              }]
          }

          payload = json.dumps(card, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(
              webhook,
              data=payload,
              headers={'Content-Type': 'application/json; charset=utf-8'},
              method='POST'
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print(f'Teams notified: {len(updated)} pages updated')
          except Exception as e:
              print(f'Teams error: {e}')
              exit(1)
          PYEOF
          python3 /tmp/check_notion.py
