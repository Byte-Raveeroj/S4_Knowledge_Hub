name: Notion Change Notify

on:
  schedule:
    - cron: '0,30 1-12 * * 1-5'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Notion databases for recent edits
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_IDS: ${{ secrets.NOTION_DATABASE_IDS }}
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          SINCE=$(date -u -d '31 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          TOTAL=0
          NAMES=""

          for DB_ID in $(echo $DB_IDS | tr ',' ' '); do
            RESP=$(curl -s -X POST \
              "https://api.notion.com/v1/databases/${DB_ID}/query" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "{\"filter\":{\"timestamp\":\"last_edited_time\",\"last_edited_time\":{\"after\":\"${SINCE}\"}}}")

            COUNT=$(echo "$RESP" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(len(d.get('results',[])))" 2>/dev/null || echo "0")

            if [ "$COUNT" -gt "0" ]; then
              TOTAL=$((TOTAL + COUNT))
              NEW=$(echo "$RESP" | python3 -c \
                "import sys,json; d=json.load(sys.stdin);
                 [print('•', r['properties'].get('Name', r['properties'].get('title', [{}]))[0].get('plain_text','—') if isinstance(r['properties'].get('Name', r['properties'].get('title',[])), list) else '—')
                  for r in d['results']]" 2>/dev/null || echo "• $COUNT items")
              NAMES="${NAMES}${NEW}\n"
            fi
          done

          if [ "$TOTAL" -gt "0" ]; then
            MSG="$TOTAL รายการใน Notion อัพเดทแล้ว:\n${NAMES}\nรัน Claude: ingest notion pages ที่เปลี่ยนแปลง"
            curl -s -X POST "${TEAMS_WEBHOOK}" \
              -H "Content-Type: application/json" \
              -d "{\"@type\":\"MessageCard\",\"themeColor\":\"5BA900\",\"title\":\"🔔 BigC IM Wiki\",\"text\":\"${MSG}\"}"
          fi
