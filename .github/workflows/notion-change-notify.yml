name: Notion Change Notify

on:
  schedule:
    - cron: '*/30 1-12 * * 1-5'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Notion databases and notify Teams
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_IDS: ${{ secrets.NOTION_DATABASE_IDS }}
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_NOTION_WEBHOOK }}
        run: |
          cat > /tmp/check_notion.py << 'PYEOF'
          import os, json, urllib.request
          from datetime import datetime, timezone, timedelta

          token   = os.environ['NOTION_TOKEN']
          db_ids  = [d.strip() for d in os.environ['DB_IDS'].split(',')]
          webhook = os.environ['TEAMS_WEBHOOK']
          since   = (datetime.now(timezone.utc) - timedelta(minutes=31)).strftime('%Y-%m-%dT%H:%M:%S.000Z')

          updated = []
          for db_id in db_ids:
              try:
                  body = json.dumps({
                      "filter": {
                          "timestamp": "last_edited_time",
                          "last_edited_time": {"after": since}
                      }
                  }).encode()
                  req = urllib.request.Request(
                      f'https://api.notion.com/v1/databases/{db_id}/query',
                      data=body,
                      headers={
                          'Authorization': f'Bearer {token}',
                          'Notion-Version': '2022-06-28',
                          'Content-Type': 'application/json'
                      },
                      method='POST'
                  )
                  with urllib.request.urlopen(req) as r:
                      data = json.loads(r.read())
                  for page in data.get('results', []):
                      title = ''
                      for val in page.get('properties', {}).values():
                          if val.get('type') == 'title':
                              title = ''.join(t.get('plain_text','') for t in val.get('title',[]))
                              break
                      updated.append(title or 'Untitled')
              except Exception as e:
                  print(f'Skip {db_id}: {e}')

          if not updated:
              print('No changes found.')
              exit(0)

          facts = [
              {'type':'TextBlock','text':f'• {n}','wrap':True,'spacing':'None'}
              for n in updated
          ]
          card = {
              'type': 'message',
              'attachments': [{
                  'contentType': 'application/vnd.microsoft.card.adaptive',
                  'content': {
                      '$schema': 'http://adaptivecards.io/schemas/adaptive-card.json',
                      'type': 'AdaptiveCard',
                      'version': '1.4',
                      'body': [
                          {
                              'type': 'TextBlock',
                              'text': '🔔 BigC IM Wiki อัพเดท',
                              'weight': 'Bolder',
                              'size': 'Large',
                              'color': 'Accent'
                          },
                          {
                              'type': 'TextBlock',
                              'text': f'พบ {len(updated)} หน้าที่แก้ไขใน 30 นาทีล่าสุด:',
                              'wrap': True
                          }
                      ] + facts + [
                          {
                              'type': 'TextBlock',
                              'text': '👉 รัน Claude ingest เพื่ออัพเดท context',
                              'weight': 'Bolder',
                              'color': 'Warning',
                              'wrap': True
                          }
                      ]
                  }
              }]
          }

          payload = json.dumps(card).encode()
          req = urllib.request.Request(
              webhook,
              data=payload,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print(f'Teams notified: {len(updated)} pages updated')
          except Exception as e:
              print(f'Teams error: {e}')
              exit(1)
          PYEOF
          python3 /tmp/check_notion.py
